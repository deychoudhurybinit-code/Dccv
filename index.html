<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCCV Foundation to Plinth Calculator</title>
</head>
<body>
    <h1>DCCV Foundation to Plinth Calculator</h1>
    <form>
        <label for="foundationDepth">Foundation Depth (m):</label>
        <input type="number" id="foundationDepth" name="foundationDepth" required><br>

        <label for="foundationWidth">Foundation Width (m):</label>
        <input type="number" id="foundationWidth" name="foundationWidth" required><br>

        <label for="plinthHeight">Plinth Height (m):</label>
        <input type="number" id="plinthHeight" name="plinthHeight" required><br>

        <button type="submit">Calculate</button>
    </form>

    <div id="result"></div>

    <script>
        document.querySelector('form').onsubmit = function(event) {
            event.preventDefault();
            const depth = parseFloat(document.getElementById('foundationDepth').value);
            const width = parseFloat(document.getElementById('foundationWidth').value);
            const height = parseFloat(document.getElementById('plinthHeight').value);
            const volume = depth * width * height;
            document.getElementById('result').innerText = `Volume of material required: ${volume} cubic meters`; 
        };
    </script>
</body>
</html>
